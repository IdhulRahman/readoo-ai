<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Readoo. - Smart Library</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
            "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
        }
    }
    </script>
</head>

<body>

<div class="bg-deco deco-1"></div>
<div class="bg-deco deco-2"></div>

<!-- WELCOME SCREEN -->
<section id="welcome-screen">
    <div class="welcome-content">
        <div class="hello-text">Hello Telyutizen</div>
        <h1 class="welcome-title">Discover Your Next Great Read.</h1>
        <p class="welcome-sub">
            Experience the future of library search with our Intelligent AI Assistant &amp; 3D Avatar
        </p>
        <button class="btn-start" onclick="enterApp()">
            Let's Get Started <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>
    <img src="/assets/images/avatar aiko.svg" alt="AI Assistant" class="avatar-static">
</section>

<!-- APP SCREEN -->
<section id="app-screen">
    <div class="main-content">
        <div class="content-wrapper">

            <!-- TEXT MODE -->
            <div id="view-text" class="view-section active">
                <div class="greeting-area">
                    <h2>Halo telyutizen</h2>
                    <p>Ayo temukan bacaan sesuai minat kamu!</p>
                </div>

                <div id="chat-history" class="chat-container">
                    <div class="msg bot">
                        Halo! Saya asisten perpustakaan Anda. Buku apa yang Anda cari?
                    </div>
                </div>

                <div class="input-container-wrapper">
                    <div class="input-box">
                        <input
                            type="text"
                            id="text-input"
                            placeholder="Tuliskan judul buku, topik, atau pengarang..."
                            autocomplete="off"
                        >
                        <button class="btn-send" onclick="sendTextChat()">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 3D MODE -->
            <div id="view-3d" class="view-section hidden 3d-mode">
                <div id="canvas-container"></div>

                <div id="avatar-ui">
                    <div class="carousel-wrapper">
                        <button id="prev-book" class="nav-btn left hidden" onclick="scrollCarousel(-1)">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>

                        <div id="book-recommendations" class="book-floating-card hidden"></div>

                        <button id="next-book" class="nav-btn right hidden" onclick="scrollCarousel(1)">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>

                    <div class="controls-area">
                        <div class="speech-input-box">
                            <input
                                type="text"
                                id="speech-display"
                                placeholder="Tekan mic dan mulai bicara..."
                                autocomplete="off"
                                readonly
                            >
                        </div>
                        <button id="mic-btn" class="btn-mic">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODE SWITCH -->
    <div class="mode-switch-container">
        <button id="nav-text" class="switch-btn active" onclick="switchTab('text')">
            <i class="fa-solid fa-message"></i> Chat
        </button>
        <button id="nav-3d" class="switch-btn" onclick="switchTab('3d')">
            <i class="fa-solid fa-cube"></i> Assistant
        </button>
    </div>
</section>

<!-- SCRIPT -->
<script type="module" src="/js/avatar-core.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
