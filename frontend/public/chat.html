<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Assistant Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
            "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
        }
    }
    </script>
</head>
<body>

    <!-- TOP NAVBAR -->
    <header class="app-navbar">
        <div class="navbar-brand">
            <i class="fa-solid fa-robot"></i> AI<span>Assistant.</span>
        </div>
        <div class="navbar-actions">
            <span class="navbar-user" id="user-display-name">Loading...</span>
            <button class="btn-logout" onclick="handleLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
            </button>
        </div>
    </header>

    <div class="app-screen">
        <div class="main-content">
            <div id="view-chat">
                <div id="canvas-container"></div>

                <!-- Speech bubble for avatar replies -->
                <div id="speech-bubble" class="hidden">
                    <p id="bubble-text">Halo! Ada yang bisa saya bantu?</p>
                </div>

                <div id="avatar-ui">
                    <div class="carousel-wrapper">
                        <button id="prev-item" class="nav-btn left hidden" onclick="scrollCarousel(-1)">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>

                        <div id="item-recommendations" class="floating-card-container hidden"></div>

                        <button id="next-item" class="nav-btn right hidden" onclick="scrollCarousel(1)">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>

                    <div class="controls-area">
                        <div class="speech-input-box">
                            <input
                                type="text"
                                id="speech-display"
                                placeholder="Tekan mic dan mulai bicara..."
                                autocomplete="off"
                                readonly
                            >
                        </div>
                        <button id="mic-btn" class="btn-mic">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/auth.js"></script>
    <script type="module" src="/js/avatar-core.js"></script>
    <script src="/js/chat.js"></script>
    <script>
        // Restrict to authenticated user role
        checkGuard('user');
    </script>
</body>
</html>
