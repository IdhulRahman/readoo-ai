<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - AI Assistant Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">AI<span>Assistant.</span></h1>
                <p class="auth-subtitle">Masukkan email Anda untuk pemulihan password</p>
            </div>

            <div id="alert-box" class="auth-alert"></div>

            <form id="forgot-form" class="auth-form" onsubmit="handleForgot(event)">
                <div class="form-group">
                    <label for="email">Email Terdaftar</label>
                    <input type="email" id="email" required placeholder="Contoh: user@domain.com">
                </div>

                <button type="submit" class="btn-auth-submit">Kirim Link Pemulihan</button>
            </form>

            <div class="auth-footer">
                Kembali ke <a href="/login">Halaman Masuk</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
