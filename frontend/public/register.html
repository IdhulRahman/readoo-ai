<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - AI Assistant Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">AI<span>Assistant.</span></h1>
                <p class="auth-subtitle">Daftar untuk membuat akun asisten baru</p>
            </div>

            <div id="alert-box" class="auth-alert"></div>

            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" required placeholder="Masukkan nama lengkap...">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Contoh: user@domain.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Minimal 8 karakter...">
                    <small style="color: var(--text-muted); font-size: 11px; margin-top: 4px;">
                        * Minimal 8 karakter, mengandung huruf kapital, angka, dan simbol.
                    </small>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Konfirmasi Password</label>
                    <input type="password" id="confirm-password" required placeholder="Masukkan kembali password...">
                </div>

                <button type="submit" class="btn-auth-submit">Daftar</button>
            </form>

            <div class="auth-footer">
                Sudah memiliki akun? <a href="/login">Masuk</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
