<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Assistant Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-bg">

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">AI<span>Assistant.</span></h1>
                <p class="auth-subtitle">Masuk untuk mengakses portal asisten AI</p>
            </div>

            <div id="alert-box" class="auth-alert"></div>

            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Username atau Email</label>
                    <input type="text" id="email" required placeholder="Masukkan username/email..." autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Masukkan password..." autocomplete="current-password">
                </div>
                
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="/forgot-password" style="font-size: 13px; color: var(--color-primary); text-decoration: none; font-weight: 500;">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-auth-submit">Masuk</button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="/register">Daftar Sekarang</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
